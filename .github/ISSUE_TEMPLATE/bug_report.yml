name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / Desktop
      placeholder: Ubuntu 24.04 + GNOME
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      placeholder: python3 screen_control.py click --position 500,400
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: JSON output / logs
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
